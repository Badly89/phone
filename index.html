<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Телефонный справочник - Администрация города</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <i class="fas fa-city logo-icon"></i>
                    <div>
                        <h1>Администрация города</h1>
                        <p>Телефонный справочник</p>
                    </div>
                </div>
                <div class="header-actions">
                    <div id="syncIndicator" class="sync-indicator" style="display: none;">
                        <i class="fas fa-sync fa-spin"></i>
                        <span>Синхронизация...</span>
                    </div>
                    <div class="header-stats">
                        <span id="totalCount">0</span> сотрудников
                    </div>
                </div>
            </div>
        </header>

        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Поиск по имени, должности, отделу или телефону..." autocomplete="off">
                <button id="clearSearch" class="clear-btn" style="display: none;"><i class="fas fa-times"></i></button>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <i class="fas fa-building"></i>
                    <select id="departmentFilter">
                        <option value="all">Все отделы</option>
                    </select>
                </div>
                <div class="filter-group">
                    <i class="fas fa-sitemap"></i>
                    <select id="structuralUnitFilter">
                        <option value="all">Все структурные подразделения</option>
                    </select>
                </div>
                <div class="filter-group">
                    <i class="fas fa-balance-scale"></i>
                    <select id="legalEntityFilter">
                        <option value="all">Все юрлица</option>
                    </select>
                </div>
                <div class="filter-group">
                    <i class="fas fa-sort-amount-down"></i>
                    <select id="sortBy">
                        <option value="name">Сортировка: по имени</option>
                        <option value="position">Сортировка: по должности</option>
                        <option value="department">Сортировка: по отделу</option>
                    </select>
                </div>
                <button id="resetFiltersBtn" class="btn-secondary">
                    <i class="fas fa-undo-alt"></i> Сбросить
                </button>
                <button id="refreshBtn" class="btn-export">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
            </div>
        </div>

        <div class="employees-container">
            <div class="employees-grid" id="employeesGrid"></div>
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <i class="fas fa-spinner fa-pulse"></i> Загрузка...
            </div>
            <div id="noResults" class="no-results" style="display: none;">
                <i class="fas fa-phone-slash"></i>
                <h3>Ничего не найдено</h3>
                <p>Попробуйте изменить параметры поиска</p>
            </div>
        </div>

        <footer class="footer">
            <p>© 2024 Администрация города. Актуальность данных подтверждена.</p>
            <p class="update-info">Последнее обновление: <span id="lastUpdate"></span></p>
        </footer>
    </div>

    <!-- Модальное окно -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-address-card"></i> Контактная информация</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="seatable-loader.js"></script>
    <script src="app.js"></script>
</body>
</html>
