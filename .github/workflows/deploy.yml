name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Ручной запуск

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }} << 'EOF'
            cd /opt/phonebook
            
            # Останавливаем старые контейнеры
            echo "🛑 Останавливаем старые контейнеры..."
            docker-compose down
            
            # Обновляем код из GitHub
            echo "📦 Обновляем код из GitHub..."
            git pull origin main
            
            # Пересобираем и запускаем
            echo "🏗️ Пересобираем и запускаем контейнеры..."
            docker-compose up -d --build
            
            # Очищаем старые образы
            echo "🧹 Очищаем старые образы..."
            docker image prune -f
            
            # Проверяем статус
            echo "✅ Статус контейнеров:"
            docker-compose ps
            
            # Проверяем логи
            echo "📋 Последние логи:"
            docker-compose logs --tail=20
          EOF

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.SERVER_IP }}:8989/api/health || exit 1
          echo "✅ Health check passed"